name = "leshiy-storage-bot"
main = "worker.js"
version = "2.5.1"
compatibility_date = "2024-03-12"

# Переменные окружения (заглушки)
# Секреты нужно настраивать в панели Cloudflare, а не здесь
[vars]
ADMIN_ID = "235663624, 5300581414"
BOT_USERNAME = "leshiy_testbot"
VK_GROUP_ID = "228491873"
VK_APP_ID = "54419010"

[secrets]
# Здесь Wrangler будет искать СЕКРЕТЫ, которые вы настроили
# Вам не нужно указывать их значения здесь, только имена.
# API-ключи из секретных переменных
TELEGRAM_TOKEN = ""
GEMINI_API_KEY = ""
CLOUDFLARE_ACCOUNT_ID = ""
CLOUDFLARE_API_TOKEN = ""
YANDEX_CLIENT_ID = ""
YANDEX_CLIENT_SECRET = ""
GOOGLE_CLIENT_ID = ""
GOOGLE_CLIENT_SECRET = ""
DROPBOX_CLIENT_ID = ""
DROPBOX_CLIENT_SECRET = ""
BOTHUB_API_KEY = ""
DEEPSEEK_API_KEY = ""
VK_GROUP_TOKEN = ""
VK_TOKEN = ""
VK_SECURE_KEY = ""
VK_SERVICE_KEY = ""
MAILRU_CLIENT_ID = ""
MAILRU_CLIENT_SECRET = ""

# [[kv_namespaces]] - Здесь Привязки KV
[[kv_namespaces]]
binding = "USER_DB"
id = "e64956db59994e7285cad1bf7ef015f1"

# [[d1_databases]] - Здесь Привязки D1
[[d1_databases]]
binding = "FILES_DB"
database_name = "files_db"
database_id = "50a338f2-dcbd-4e5d-b6cd-bfb93bb7dd91"

# [ai] - для Workers AI
[ai]
binding = "AI"
